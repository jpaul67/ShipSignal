name: "ShipSignal readiness gate"
description: "Score a repo's agent-readiness in CI, post the report to the run summary, and optionally fail below a threshold."
author: "jpaul67"

branding:
  icon: "anchor"
  color: "yellow"

inputs:
  path:
    description: "Path to the repo (or subdirectory) to scan."
    required: false
    default: "."
  fail-under:
    description: "Fail the job if the readiness score is below this number (0-100). Leave empty to report without ever failing."
    required: false
    default: ""
  version:
    description: "Version of shipsignal to install from PyPI (e.g. 0.6.6). Empty installs the latest."
    required: false
    default: ""
  python-version:
    description: "Python version used to run shipsignal."
    required: false
    default: "3.12"
  summary:
    description: "Write the Markdown readiness report to the job summary ('true' or 'false')."
    required: false
    default: "true"
  args:
    description: "Extra arguments passed through to `shipsignal scan` (e.g. --badge badge.svg)."
    required: false
    default: ""
  pr-comment:
    description: >-
      Post (and keep updated) a sticky PR comment with the score, grade, and top fixes
      ('true' or 'false'). Only fires on pull_request/pull_request_target events. Requires
      `permissions: pull-requests: write` on the calling workflow; degrades to a log notice
      (never fails the job) if the token can't write comments, e.g. on a fork PR.
    required: false
    default: "false"

outputs:
  score:
    description: "The readiness score (0-100)."
    value: ${{ steps.scan.outputs.score }}
  passed:
    description: "'true' if the score met the threshold (or no threshold was set), otherwise 'false'."
    value: ${{ steps.scan.outputs.passed }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install shipsignal
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: python -m pip install --quiet "shipsignal${VERSION:+==$VERSION}"

    - name: Scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FAIL_UNDER: ${{ inputs.fail-under }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_PR_COMMENT: ${{ inputs.pr-comment }}
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        work="$(mktemp -d)"
        json="$work/readiness.json"
        md="$work/readiness.md"

        # Word-split the optional passthrough args (guarded for bash 3.2 / set -u).
        extra=()
        if [ -n "$INPUT_ARGS" ]; then
          # shellcheck disable=SC2206
          extra=($INPUT_ARGS)
        fi

        # --fail-under 0 (never fails; scores are always >= 0) overrides any
        # fail_under the target repo's own .shipsignal.toml declares — Package G
        # made the CLI honor that config key, but this step still needs to gate
        # itself below so the summary + outputs are produced even on a failing
        # score, and set -euo pipefail would otherwise abort the step early.
        python -m shipsignal.cli scan "$INPUT_PATH" \
          --json "$json" --md "$md" --fail-under 0 ${extra[@]+"${extra[@]}"}

        # Parse the score and decide pass/fail in Python (handles int or float).
        result="$(python - "$json" "$INPUT_FAIL_UNDER" <<'PY'
        import json, sys
        data = json.load(open(sys.argv[1]))
        score = data["score"]
        threshold = sys.argv[2]
        ok = threshold == "" or score >= float(threshold)
        print(score, "true" if ok else "false")
        PY
        )"
        score="${result% *}"
        passed="${result##* }"

        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "passed=$passed" >> "$GITHUB_OUTPUT"

        if [ "$INPUT_SUMMARY" = "true" ]; then
          cat "$md" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Sticky PR comment: posted before the pass/fail gate below so it always
        # appears, even on a failing score. Only fires when the event carries a PR
        # number (pull_request / pull_request_target); silently skipped on push.
        if [ "$INPUT_PR_COMMENT" = "true" ] && [ -n "${PR_NUMBER:-}" ]; then
          comment="$work/comment.md"
          python - "$json" "$INPUT_FAIL_UNDER" > "$comment" <<'PY'
        import json, sys
        data = json.load(open(sys.argv[1]))
        threshold = sys.argv[2]
        score, grade = data["score"], data["grade"]
        ok = threshold == "" or score >= float(threshold)
        findings = [f for f in data.get("findings", [])
                    if f.get("severity") == "warn" and not f.get("informational")]
        findings.sort(key=lambda f: -f.get("points_at_stake", 0.0))
        top = findings[:3]
        out = ["<!-- shipsignal-report -->", "",
               f"### ShipSignal readiness: {score}/100 — grade {grade}"]
        if threshold:
            out.append(("✅ passed" if ok else "❌ below") + f" threshold {threshold}")
        out.append("")
        if top:
            out.append("**Top fixes (highest payoff first):**")
            for f in top:
                pts = f.get("points_at_stake", 0.0)
                out.append(f"- **{f.get('area', '')}** — {f['evidence']} (≈+{pts:g} pts)  ")
                out.append(f"  → {f['fix']}")
        else:
            out.append("No outstanding fixes — nicely set up. ✓")
        out += ["", "<sub>via [ShipSignal](https://github.com/jpaul67/ShipSignal)</sub>"]
        print("\n".join(out))
        PY

          # The marker below must match the one the Python block prints above.
          existing_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq '[.[] | select(.body | startswith("<!-- shipsignal-report -->"))][0].id // empty' \
            2>/dev/null || true)"

          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" \
              -F body=@"$comment" >/dev/null 2>&1 \
              || echo "::notice::shipsignal: could not update the PR comment (read-only token, e.g. a fork PR?) — skipping"
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              -F body=@"$comment" >/dev/null 2>&1 \
              || echo "::notice::shipsignal: could not post a PR comment (read-only token, e.g. a fork PR?) — skipping"
          fi
        fi

        if [ "$passed" = "false" ]; then
          echo "::error::ShipSignal readiness $score is below the required $INPUT_FAIL_UNDER"
          exit 1
        fi
        echo "ShipSignal readiness: $score (threshold: ${INPUT_FAIL_UNDER:-none})"
