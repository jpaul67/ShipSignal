# Copy this into your repo at .github/workflows/live-badge.yml
#
# Publishes a LIVE readiness badge: unlike the static SVG from `--badge`,
# this JSON gets re-published to a gist on every run, so a badge pasted into
# your README updates automatically — no commit needed when the score changes.
#
# One-time setup:
#   1. Create a gist to hold the badge JSON (note the returned ID):
#        gh gist create --public -d "shipsignal readiness badge" <(echo '{}')
#   2. Create a classic PAT with `gist` scope (fine-grained tokens don't cover
#      the Gist API) and add it as a repo secret named GIST_TOKEN.
#   3. Set GIST_ID below (or as a repo variable) to the ID from step 1.
#   4. Paste this into your README, replacing <gist-id> and <github-user>:
#        ![readiness](https://img.shields.io/endpoint?url=https://gist.githubusercontent.com/<github-user>/<gist-id>/raw/badge.json)

name: live-badge

on:
  push:
    branches: [main]
  workflow_dispatch:

# The default GITHUB_TOKEN only needs to check the repo out; the actual gist
# write uses GIST_TOKEN (a separate classic PAT), not this token.
permissions:
  contents: read

jobs:
  publish-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: pip install --quiet shipsignal
      - run: shipsignal scan . --badge-json badge.json
      # `gh` ships preinstalled on GitHub-hosted runners.
      - env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ vars.GIST_ID }}
        run: gh gist edit "$GIST_ID" badge.json
