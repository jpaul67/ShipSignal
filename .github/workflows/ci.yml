name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # fetch-depth: 0 (full history) — the self-scan dogfood tests below walk this
      # repo's own git log (TestSelfImpact et al.); a shallow depth-1 checkout leaves
      # only whatever single commit triggered the run, which on a pull_request event
      # is the synthetic PR-merge commit, occasionally attributed to a bot account
      # (e.g. dependabot) and misclassified as "no development commits to analyze".
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Tests
        run: python -m unittest discover -s tests -v
      - name: Self-scan (dogfood gate)
        run: python -m shipsignal.cli scan . --fail-under 90

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Ruff
        run: |
          pip install ruff
          ruff check .

  action:
    # Dogfood the composite Action end-to-end (installs the published shipsignal,
    # writes the job summary, sets outputs, enforces the gate at the self-scan floor,
    # and posts/updates the sticky PR comment on ShipSignal's own PRs).
    runs-on: ubuntu-latest
    # Job-level override: pull-requests: write is scoped to this job only, since
    # only the PR-comment step needs it. Job-level permissions replace the
    # top-level defaults entirely, so contents: read must be repeated here.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gate
        uses: ./
        with:
          fail-under: "90"
          pr-comment: "true"
      - name: Assert outputs are set
        shell: bash
        run: |
          echo "score=${{ steps.gate.outputs.score }} passed=${{ steps.gate.outputs.passed }}"
          test -n "${{ steps.gate.outputs.score }}"
          test "${{ steps.gate.outputs.passed }}" = "true"
